<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screw Counter Vision</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Screw Counter AI</h1>
            <p>Upload an image and let our vision model count the screws accurately.</p>
        </header>

        <div class="api-key-section">
            <svg class="lock-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            <input type="password" id="api-key-input" placeholder="Enter Roboflow API Key (Saved Locally)">
            <button id="save-key-btn" class="secondary-btn">Save</button>
        </div>

        <main>
            <div class="upload-section" id="drop-zone">
                <div class="upload-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                </div>
                <h2>Drag & Drop your image here</h2>
                <p>or click to browse from your computer</p>
                <input type="file" id="file-input" accept="image/*" hidden>
            </div>

            <div class="preview-section hidden" id="preview-section">
                <img id="image-preview" src="" alt="Screw Preview">
                <div class="action-buttons">
                    <button id="cancel-btn" class="secondary-btn">Cancel</button>
                    <button id="count-btn" class="primary-btn">Count Screws</button>
                </div>
            </div>

            <div class="result-section hidden" id="result-section">
                <h3>Analysis Results</h3>
                <div class="loading hidden" id="loading-spinner">
                    <div class="spinner"></div>
                    <p>Analyzing image with Roboflow...</p>
                </div>
                <div id="result-content" class="hidden"></div>
            </div>
        </main>
    </div>

    <script src="screw.js"></script>
</body>
</html>
